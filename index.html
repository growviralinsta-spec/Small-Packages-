<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adnan Reel Boost</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0b0b0b;color:white;}
.container{max-width:1200px;margin:auto;padding:20px;}
header{text-align:center;padding:50px 20px;}
header h1{color:#00ff9c;font-size:40px;}

.packages{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#111;
padding:25px;
border-radius:16px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,156,.15);
}

.price{font-size:28px;color:#00ff9c;margin:15px 0;}

button{
background:#00ff9c;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
width:100%;
}
</style>
</head>

<body>
<div class="container">

<header>
<h1>🚀 Adnan Reel Boost</h1>
<p>Select Package & Pay Instantly</p>
</header>

<div class="packages">

<div class="card">
<h3>Starter Reel Boost</h3>
<div class="price">₹29</div>
<button onclick="payNow(29,'Starter Reel Boost')">Order Now</button>
</div>

<div class="card">
<h3>Growth Reel Boost</h3>
<div class="price">₹49</div>
<button onclick="payNow(49,'Growth Reel Boost')">Order Now</button>
</div>

<div class="card">
<h3>Pro Reel Boost</h3>
<div class="price">₹69</div>
<button onclick="payNow(69,'Pro Reel Boost')">Order Now</button>
</div>

</div>
</div>

<script>
function payNow(amount, pkg){
  localStorage.setItem("pkg", pkg);
  localStorage.setItem("amount", amount);

  const upiLink = `upi://pay?pa=paytm.s1qzkel@pty&pn=Adnan%20SMM&am=${amount}&cu=INR`;

  // UPI open
  window.location.href = upiLink;

  // Auto redirect to thank you page
  setTimeout(function(){
    window.location.href = "thankyou.html";
  },3000);
}
</script>

</body>
</html>
